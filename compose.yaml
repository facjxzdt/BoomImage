services:
  app:
    image: ${BOOMIMAGE_IMAGE:?set BOOMIMAGE_IMAGE in .env, for example ghcr.io/facjxzdt/boomimage:latest}
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      APP_DATA_DIR: /data
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      APP_SECRET: ${APP_SECRET:?set APP_SECRET in .env to a random value of at least 32 characters}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-2592000}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_RATE_LIMIT_MAX_ATTEMPTS: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:-10}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
      MAX_INPUT_PIXELS: ${MAX_INPUT_PIXELS:-50000000}
      TMP_FILE_TTL_SECONDS: ${TMP_FILE_TTL_SECONDS:-86400}
      TMP_CLEANUP_INTERVAL_SECONDS: ${TMP_CLEANUP_INTERVAL_SECONDS:-3600}
      IMAGE_WORKERS: ${IMAGE_WORKERS:-2}
      JOB_POLL_INTERVAL_MS: ${JOB_POLL_INTERVAL_MS:-1000}
      JOB_LEASE_SECONDS: ${JOB_LEASE_SECONDS:-300}
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
      AVIF_QUALITY: ${AVIF_QUALITY:-50}
      AVIF_EFFORT: ${AVIF_EFFORT:-4}
      WEBP_QUALITY: ${WEBP_QUALITY:-82}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      S3_ACCESS_MODE: ${S3_ACCESS_MODE:-proxy}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PREFIX: ${S3_PREFIX:-boomimage}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_SESSION_TOKEN: ${S3_SESSION_TOKEN:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    volumes:
      - ./data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    init: true

  caddy:
    image: caddy:2-alpine
    environment:
      APP_ADDRESS: ${APP_ADDRESS:-:80}
    ports:
      - "${CADDY_HTTP_BIND:-127.0.0.1:3001}:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/originals:/srv/media/originals:ro
      - ./data/variants:/srv/media/variants:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
